<!doctype html>
<html lang="pt-BR" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Luiz Henrique Cunha do Nascimento | Desenvolvedor e Suporte de TI</title>
    <meta
      name="description"
      content="Portfólio de Luiz Henrique Cunha do Nascimento, tecnólogo em Análise e Desenvolvimento de Sistemas em Manaus. Sistemas internos, automações e infraestrutura de TI."
    />
    <meta name="author" content="Luiz Henrique Cunha do Nascimento" />

    <!--
      Open Graph: é o que o LinkedIn, o WhatsApp e o Facebook leem para montar o
      cartão de prévia quando alguém cola o link. Esses robôs não executam
      JavaScript, então os valores precisam estar no HTML estático mesmo.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Luiz Henrique Cunha do Nascimento | Desenvolvedor e Suporte de TI" />
    <meta
      property="og:description"
      content="Transformo processos manuais em sistemas automatizados, da infraestrutura de TI ao código que economiza dias de trabalho."
    />
    <meta property="og:locale" content="pt_BR" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!--
      O preconnect abre a conexão com o servidor de fontes antes de o navegador
      descobrir que precisa dela, economizando o tempo de DNS, TCP e TLS.
      O crossorigin no segundo link não é decoração: arquivos de fonte são
      baixados em modo anônimo, e sem esse atributo a conexão pré-aquecida não
      seria reaproveitada.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      Esta div vazia é o único ponto de contato entre o HTML e o React. Todo o
      resto da página é criado por JavaScript e injetado aqui dentro.
    -->
    <div id="root"></div>

    <noscript>
      Este portfólio precisa de JavaScript para funcionar. Se preferir, entre em
      contato por luizcunha123001@gmail.com ou em linkedin.com/in/luizhcunha.
    </noscript>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
