<!--
  Ícone da aba do navegador.

  Em SVG e não em PNG porque fica nítido em qualquer tamanho de tela e pesa
  menos de 1KB. Tudo que está na pasta public é copiado direto para o build sem
  passar por processamento, e o caminho vira "/favicon.svg".
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#1e4fd8" />
  <text
    x="32"
    y="43"
    text-anchor="middle"
    font-family="Space Grotesk, Segoe UI, sans-serif"
    font-size="30"
    font-weight="700"
    fill="#ffffff"
  >LH.</text>
</svg>
